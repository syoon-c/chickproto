<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>노란 요리사</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone-frame">
        <canvas id="game-canvas" width="390" height="844"></canvas>

        <div class="overlay top-bar">
          <div class="pill resource acorn-pill">
            <span class="pill-label">
              <img class="pill-icon-image" src="icon/currency/Icon_Currency_001.png" alt="도토리" />
              도토리
            </span>
            <strong id="acorn-count">0</strong>
          </div>
        </div>

        <div class="overlay utility-stack utility-stack-top-right">
          <button id="reset-data-btn" class="utility-btn utility-btn-compact" type="button">↺ 리셋</button>
        </div>

        <div class="overlay promo-stack">
          <button id="promotion-btn" class="promo-btn" type="button">
            <span class="promo-btn-kicker">📣</span>
            <strong>홍보</strong>
            <div class="promo-progress promo-progress-inline" aria-hidden="true">
              <div class="promo-progress-bar">
                <div id="promotion-fill" class="promo-progress-fill"></div>
              </div>
            </div>
            <span id="promotion-text">0 / 4</span>
          </button>
        </div>
      </section>
    </main>

    <script src="tablejson-data.js"></script>
    <script src="guest-personas.js"></script>
    <script src="recipe-icon-library.js"></script>
    <script src="js/game-data.js"></script>
    <script src="js/core/game-utils.js"></script>
    <script src="js/systems/farm-system.js"></script>
    <script src="js/core/save-state.js"></script>
    <script src="js/systems/interview-system.js"></script>
    <script src="js/systems/gameplay-system.js"></script>
    <script src="js/game-ui.js"></script>
    <script src="js/render/game-render.js"></script>
    <script src="game.js"></script>
  </body>
</html>
